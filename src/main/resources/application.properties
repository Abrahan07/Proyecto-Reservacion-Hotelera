# Conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/staytic_db
spring.datasource.username=stayticuser
spring.datasource.password=staytic123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

