<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Reservar</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --brand: #8B2E2E;
            --brand-dark: #6e2323;
            --bg: #f5f6f8;
            --panel: #ffffff;
            --line: #e5e7eb;
            --muted: #6b7280;
            --text: #1f2937;
            --soft: #f9fafb;
        }
        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: var(--brand);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        header a {
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
        main {
            max-width: 1120px;
            margin: 30px auto;
            padding: 0 16px;
        }
        .page-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 18px;
            margin-bottom: 18px;
        }
        h1 {
            margin: 0;
            color: var(--brand);
            font-size: 30px;
        }
        .subtitle {
            color: var(--muted);
            margin: 7px 0 0;
        }
        .search {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
            box-shadow: 0 10px 26px rgba(15, 23, 42, .06);
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--muted);
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font: inherit;
        }
        input:focus {
            outline: 3px solid rgba(139, 46, 46, .14);
            border-color: var(--brand);
        }
        .btn {
            border: 0;
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 800;
            text-align: center;
        }
        .btn-primary {
            background: var(--brand);
            color: white;
        }
        .btn-primary:hover { background: var(--brand-dark); }
        .alert {
            background: #fdecea;
            color: #b3261e;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            border: 1px solid #f2b8b5;
            font-weight: 700;
        }
        .empty {
            background: white;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 28px;
            color: var(--muted);
            text-align: center;
            box-shadow: 0 10px 26px rgba(15, 23, 42, .06);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .room {
            background: white;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 26px rgba(15, 23, 42, .06);
            display: grid;
        }
        .photo {
            min-height: 126px;
            background:
                    linear-gradient(135deg, rgba(139,46,46,.92), rgba(74,85,104,.82)),
                    linear-gradient(45deg, #f3f4f6 25%, transparent 25%),
                    linear-gradient(-45deg, #ffffff 25%, transparent 25%);
            display: flex;
            align-items: flex-end;
            padding: 16px;
            color: white;
            font-weight: 900;
            font-size: 24px;
        }
        .body {
            padding: 16px;
            display: grid;
            gap: 12px;
        }
        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill {
            padding: 6px 9px;
            border-radius: 999px;
            background: var(--soft);
            border: 1px solid var(--line);
            font-size: 12px;
            font-weight: 800;
        }
        .description {
            color: var(--muted);
            line-height: 1.45;
            margin: 0;
            min-height: 42px;
        }
        .footer {
            border-top: 1px solid var(--line);
            padding-top: 14px;
            display: grid;
            gap: 12px;
        }
        .price {
            color: var(--brand);
            font-weight: 900;
            font-size: 23px;
        }
        .price small {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }
        @media(max-width:760px) {
            header, .page-head {
                flex-direction: column;
                align-items: stretch;
            }
            .search {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic</strong>
    <a th:href="@{/dashboard}">Dashboard</a>
</header>
<main>
    <div class="page-head">
        <div>
            <h1>Reservar habitacion</h1>
            <p class="subtitle">Elige fechas disponibles y continua con la confirmacion de tu reserva.</p>
        </div>
    </div>

    <form class="search" th:action="@{/cliente/habitaciones}" method="get">
        <div>
            <label for="checkIn">Entrada</label>
            <input id="checkIn" name="checkIn" type="date" th:value="${checkIn}" required>
        </div>
        <div>
            <label for="checkOut">Salida</label>
            <input id="checkOut" name="checkOut" type="date" th:value="${checkOut}" required>
        </div>
        <button class="btn btn-primary" type="submit">Buscar disponibilidad</button>
    </form>

    <div th:if="${error}" class="alert" th:text="${error}"></div>

    <div th:if="${rooms != null and #lists.isEmpty(rooms)}" class="empty">
        No hay habitaciones disponibles para esas fechas.
    </div>

    <section class="grid" th:if="${rooms != null and !#lists.isEmpty(rooms)}">
        <article class="room" th:each="r : ${rooms}">
            <div class="photo" th:text="'Habitacion ' + ${r.number}">Habitacion</div>
            <div class="body">
                <div class="meta">
                    <span class="pill" th:text="${r.type}"></span>
                    <span class="pill" th:text="'Piso ' + ${r.floor}"></span>
                    <span class="pill" th:text="${r.status}"></span>
                </div>
                <p class="description" th:text="${#strings.isEmpty(r.description) ? 'Habitacion confortable para tu estadia.' : r.description}"></p>
                <div class="footer">
                    <div class="price">
                        <span th:text="'$ ' + ${#numbers.formatDecimal(r.pricePerNight,1,0)}"></span>
                        <small>/ noche</small>
                    </div>
                    <a class="btn btn-primary"
                       th:href="@{/cliente/reservar(roomId=${r.roomId},checkIn=${checkIn},checkOut=${checkOut})}">
                        Reservar esta habitacion
                    </a>
                </div>
            </div>
        </article>
    </section>
</main>
</body>
</html>
