<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Pago</title>
    <style>
        *{box-sizing:border-box}:root{--brand:#8B2E2E;--bg:#f3f4f6;--line:#e5e7eb;--muted:#6b7280}
        body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#222}
        header{background:var(--brand);color:white;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
        header a{color:white;text-decoration:none;font-weight:700}
        main{max-width:820px;margin:28px auto;padding:0 16px}
        h1{margin:0 0 18px;color:var(--brand);font-size:30px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
        .summary{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.row{padding:12px;background:#fafafa;border:1px solid var(--line);border-radius:8px}.label{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;margin-bottom:4px}
        .total{font-size:30px;color:var(--brand);font-weight:900}.services{margin:0;padding-left:18px}.services li{margin-bottom:4px}
        label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:7px}.error{display:block;color:#b3261e;font-size:13px;margin-top:4px}
        .actions{display:flex;gap:10px;margin-top:18px}.btn{border:0;border-radius:7px;padding:10px 14px;cursor:pointer;text-decoration:none;font-weight:700;display:inline-block}.btn-primary{background:var(--brand);color:white}.btn-secondary{background:#4b5563;color:white}
        @media(max-width:720px){header,.summary{grid-template-columns:1fr;flex-direction:column;align-items:stretch}}
    </style>
</head>
<body>
<header>
    <strong>Staytic</strong>
    <a th:href="@{/mis-reservas}">Mis reservas</a>
</header>
<main>
    <h1>Pago de reservacion</h1>
    <section class="card">
        <div class="summary">
            <div class="row">
                <span class="label">Reservacion</span>
                <strong th:text="'#' + ${reservation.reservationId}"></strong>
            </div>
            <div class="row">
                <span class="label">Habitacion</span>
                <strong th:text="${reservation.details[0].room.number}"></strong>
            </div>
            <div class="row">
                <span class="label">Fechas</span>
                <strong th:text="${reservation.details[0].scheduledCheckIn + ' a ' + reservation.details[0].scheduledCheckOut}"></strong>
            </div>
            <div class="row">
                <span class="label">Total</span>
                <div class="total" th:text="'$ ' + ${#numbers.formatDecimal(reservation.calculateTotal(),1,2)}"></div>
            </div>
        </div>

        <div class="row" th:if="${reservation.services != null and !#lists.isEmpty(reservation.services)}">
            <span class="label">Servicios adicionales</span>
            <ul class="services">
                <li th:each="s : ${reservation.services}" th:text="${s.name + ' - $ ' + #numbers.formatDecimal(s.price,1,2)}"></li>
            </ul>
        </div>

        <form th:action="@{/cliente/pago/{id}(id=${reservation.reservationId})}" th:object="${paymentForm}" method="post">
            <div style="margin-top:16px">
                <label for="paymentMethod">Metodo de pago</label>
                <select id="paymentMethod" th:field="*{paymentMethod}" required>
                    <option value="">Seleccione un metodo</option>
                    <option th:each="m : ${methods}" th:value="${m}" th:text="${m}"></option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></span>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Pagar y confirmar</button>
                <a class="btn btn-secondary" th:href="@{/mis-reservas}">Pagar despues</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
