<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Reservaciones</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; margin-left: 14px; }
        main { max-width: 1240px; margin: 26px auto; padding: 0 16px; }
        .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
        h1 { margin: 0; color: #8B2E2E; font-size: 28px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn-danger { background: #b3261e; color: white; }
        .btn-small { padding: 7px 10px; font-size: 13px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
        .filters { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 12px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 9px 10px; border: 1px solid #bbb; border-radius: 6px; }
        .alert { padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: #1b5e20; }
        .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1050px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        th { background: #8B2E2E; color: white; font-size: 13px; text-transform: uppercase; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #eee; display: inline-block; }
        .status-form { display: flex; gap: 6px; align-items: center; }
        .status-form select { min-width: 130px; }
        .muted { color: #666; font-size: 13px; }
        @media (max-width: 900px) {
            header, .topbar { align-items: stretch; flex-direction: column; }
            .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Reservaciones</strong>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/receptionist/rooms}">Habitaciones</a>
    </nav>
</header>

<main>
    <div class="topbar">
        <h1>Gestion de reservaciones</h1>
        <div>
            <a class="btn btn-secondary" th:href="@{/receptionist/reservations/availability}">Disponibilidad</a>
            <a class="btn btn-primary" th:href="@{/receptionist/reservations/new}">Nueva reservacion</a>
        </div>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <section class="panel">
        <form class="filters" th:action="@{/receptionist/reservations}" method="get">
            <div>
                <label for="userText">Usuario</label>
                <input id="userText" name="userText" type="text" th:value="${userText}" placeholder="Nombre o email">
            </div>
            <div>
                <label for="roomText">Habitacion</label>
                <input id="roomText" name="roomText" type="text" th:value="${roomText}" placeholder="Numero">
            </div>
            <div>
                <label for="checkIn">Entrada</label>
                <input id="checkIn" name="checkIn" type="date" th:value="${checkIn}">
            </div>
            <div>
                <label for="checkOut">Salida</label>
                <input id="checkOut" name="checkOut" type="date" th:value="${checkOut}">
            </div>
            <div>
                <label for="status">Estado</label>
                <select id="status" name="status">
                    <option value="">Todos</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                            th:selected="${selectedStatus != null and selectedStatus == s}"></option>
                </select>
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/reservations}">Limpiar</a>
            </div>
        </form>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Habitaciones</th>
                <th>Fechas</th>
                <th>Huespedes</th>
                <th>Promocion</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(reservations)}">
                <td colspan="8">No hay reservaciones con esos filtros.</td>
            </tr>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.reservationId}"></td>
                <td>
                    <strong th:text="${r.user.name}"></strong><br>
                    <span class="muted" th:text="${r.user.email}"></span>
                </td>
                <td>
                    <div th:each="d : ${r.details}">
                        <span th:text="${d.room.number}"></span>
                        <span class="muted" th:text="'(' + ${d.room.type} + ')'"></span>
                    </div>
                </td>
                <td>
                    <div th:each="d : ${r.details}">
                        <span th:text="${d.scheduledCheckIn}"></span>
                        <span> a </span>
                        <span th:text="${d.scheduledCheckOut}"></span>
                    </div>
                </td>
                <td th:text="${r.totalGuests}"></td>
                <td th:text="${r.promotion == null ? '-' : r.promotion.code}"></td>
                <td><span class="badge" th:text="${r.status}"></span></td>
                <td>
                    <div class="actions">
                        <form class="status-form" th:action="@{/receptionist/reservations/{id}/status(id=${r.reservationId})}" method="post">
                            <select name="status">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${r.status == s}"></option>
                            </select>
                            <button class="btn btn-primary btn-small" type="submit">Cambiar</button>
                        </form>
                        <a class="btn btn-secondary btn-small" th:href="@{/receptionist/reservations/{id}/edit(id=${r.reservationId})}">Editar</a>
                        <form th:action="@{/receptionist/reservations/{id}/delete(id=${r.reservationId})}" method="post"
                              onsubmit="return confirm('Seguro que deseas eliminar esta reservacion?');">
                            <button class="btn btn-danger btn-small" type="submit">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
