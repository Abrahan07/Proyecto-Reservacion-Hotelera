<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Reservacion</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; }
        main { max-width: 820px; margin: 26px auto; padding: 0 16px; }
        h1 { margin: 0 0 18px; color: #8B2E2E; font-size: 28px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field-full { grid-column: 1 / -1; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #bbb; border-radius: 6px; font-family: Arial, sans-serif; }
        select[multiple] { min-height: 150px; }
        textarea { min-height: 95px; resize: vertical; }
        .error { display: block; color: #b3261e; font-size: 13px; margin-top: 4px; }
        .global-error { background: #fdecea; color: #b3261e; padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; }
        .alert { padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: #1b5e20; }
        .alert-error { background: #fdecea; color: #b3261e; border: 1px solid #f2b8b5; }
        .actions { display: flex; gap: 10px; margin-top: 18px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn-success { background: #256d3b; color: white; }
        .hint { color: #666; font-size: 13px; margin-top: 5px; }
        .section-title { margin: 0 0 14px; color: #8B2E2E; font-size: 20px; }
        .reception-panel { margin-top: 18px; }
        .reception-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .info-box { border: 1px solid #ddd; border-radius: 7px; padding: 12px; background: #fafafa; }
        .info-label { color: #666; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .info-value { margin-top: 5px; font-weight: 700; }
        @media (max-width: 760px) {
            header { align-items: stretch; flex-direction: column; }
            .grid, .reception-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Reservaciones</strong>
    <a th:href="@{/receptionist/reservations}">Volver a reservaciones</a>
</header>

<main>
    <h1 th:text="${editing} ? 'Editar reservacion' : 'Nueva reservacion'"></h1>

    <div th:if="${success}" class="alert" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="panel">
        <form th:object="${reservationForm}"
              th:action="${editing} ? @{/receptionist/reservations/{id}(id=${reservationForm.reservationId})} : @{/receptionist/reservations}"
              method="post">
            <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>
            <div class="grid">
                <div class="field-full">
                    <label for="userId">Usuario</label>
                    <select id="userId" th:field="*{userId}" required>
                        <option value="">Seleccione un usuario</option>
                        <option th:each="u : ${users}" th:value="${u.userId}"
                                th:text="${u.name + ' - ' + u.email}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></span>
                </div>

                <div class="field-full">
                    <label for="roomIds">Habitaciones</label>
                    <select id="roomIds" th:field="*{roomIds}" multiple required>
                        <option th:each="r : ${rooms}" th:value="${r.roomId}"
                                th:text="${r.number + ' - Piso ' + r.floor + ' - ' + r.type + ' - ' + r.status}"></option>
                    </select>
                    <p class="hint">Mantén presionada Ctrl para seleccionar varias habitaciones.</p>
                    <span class="error" th:if="${#fields.hasErrors('roomIds')}" th:errors="*{roomIds}"></span>
                </div>

                <div>
                    <label for="checkIn">Fecha de entrada</label>
                    <input id="checkIn" type="date" th:field="*{checkIn}" required>
                    <span class="error" th:if="${#fields.hasErrors('checkIn')}" th:errors="*{checkIn}"></span>
                </div>

                <div>
                    <label for="checkOut">Fecha de salida</label>
                    <input id="checkOut" type="date" th:field="*{checkOut}" required>
                    <span class="error" th:if="${#fields.hasErrors('checkOut')}" th:errors="*{checkOut}"></span>
                </div>

                <div>
                    <label for="totalGuests">Total de huespedes</label>
                    <input id="totalGuests" type="number" min="1" th:field="*{totalGuests}" required>
                    <span class="error" th:if="${#fields.hasErrors('totalGuests')}" th:errors="*{totalGuests}"></span>
                </div>

                <div>
                    <label for="status">Estado</label>
                    <select id="status" th:field="*{status}">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                    </select>
                </div>

                <div class="field-full">
                    <label for="promotionCode">Codigo de promocion</label>
                    <input id="promotionCode" type="text" th:field="*{promotionCode}" placeholder="Opcional">
                    <span class="error" th:if="${#fields.hasErrors('promotionCode')}" th:errors="*{promotionCode}"></span>
                </div>

                <div class="field-full">
                    <label for="notes">Notas</label>
                    <textarea id="notes" th:field="*{notes}"></textarea>
                    <span class="error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></span>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/reservations}">Cancelar</a>
            </div>
        </form>
    </section>

    <section class="panel reception-panel" th:if="${editing}">
        <h2 class="section-title">Recepcion</h2>

        <div class="reception-grid">
            <div class="info-box">
                <div class="info-label">Check-in</div>
                <div class="info-value"
                     th:text="${reservation.checkInDateTime == null ? 'Pendiente' : #temporals.format(reservation.checkInDateTime, 'yyyy-MM-dd HH:mm')}"></div>
                <p class="hint"
                   th:text="${reservation.employeeCheckIn == null ? 'Sin recepcionista asignado' : 'Registrado por ' + reservation.employeeCheckIn.name}"></p>
            </div>

            <div class="info-box">
                <div class="info-label">Check-out</div>
                <div class="info-value"
                     th:text="${reservation.checkOutDateTime == null ? 'Pendiente' : #temporals.format(reservation.checkOutDateTime, 'yyyy-MM-dd HH:mm')}"></div>
                <p class="hint"
                   th:text="${reservation.employeeCheckOut == null ? 'Sin recepcionista asignado' : 'Registrado por ' + reservation.employeeCheckOut.name}"></p>
            </div>
        </div>

        <form class="actions"
              th:if="${reservation.checkInDateTime == null and reservation.status.name() != 'CANCELLED' and reservation.status.name() != 'FINISHED'}"
              th:action="@{/receptionist/reservations/{id}/check-in(id=${reservation.reservationId})}" method="post">
            <button class="btn btn-success" type="submit">Realizar check-in</button>
        </form>

        <form th:if="${reservation.checkInDateTime != null and reservation.checkOutDateTime == null and reservation.status.name() != 'CANCELLED'}"
              th:action="@{/receptionist/reservations/{id}/check-out(id=${reservation.reservationId})}" method="post">
            <div class="grid" style="margin-top: 18px;">
                <div>
                    <label for="additionalCharges">Consumos adicionales</label>
                    <input id="additionalCharges" name="additionalCharges" type="number" min="0" step="0.01"
                           th:value="${reservation.additionalCharges}">
                </div>
                <div>
                    <label for="penalty">Penalizacion</label>
                    <input id="penalty" name="penalty" type="number" min="0" step="0.01"
                           th:value="${reservation.penalty}">
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Realizar check-out</button>
            </div>
        </form>

        <p class="hint"
           th:if="${reservation.checkOutDateTime != null or reservation.status.name() == 'CANCELLED'}">
            No hay acciones de recepcion disponibles para esta reservacion.
        </p>
    </section>
</main>
</body>
</html>
