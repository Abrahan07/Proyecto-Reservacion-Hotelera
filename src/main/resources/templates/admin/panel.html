<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Staytic - Panel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --burdo: #8B2E2E;
            --burdo-dark: #6e2323;
            --bg: #e8e8e8;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --muted: #666;
            --border: #d0d0d0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--burdo);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }
        .nav-back {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s;
        }
        .nav-back:hover { color: white; }

        /* ── MAIN ── */
        main {
            flex: 1;
            max-width: 1020px;
            width: 100%;
            margin: 2.5rem auto;
            padding: 0 1.2rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            color: var(--burdo);
            font-size: 1.6rem;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── TABLE ── */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--burdo);
        }
        thead th {
            color: white;
            padding: 1rem 1.2rem;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        tbody td {
            padding: 0.95rem 1.2rem;
            font-size: 0.92rem;
            color: var(--text);
            border-bottom: 1px solid #f0f0f0;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:nth-child(even) { background: #fafafa; }
        tbody tr:hover { background: #f5eded; }

        /* ── BADGES ── */
        .badge {
            padding: 0.28rem 0.85rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            display: inline-block;
        }
        .badge-admin        { background: #fdf0e0; color: #a0522d; }
        .badge-receptionist { background: #eaf5ea; color: #2e7d32; }
        .badge-guest        { background: #f0eded; color: var(--burdo); }

        .active-yes { color: #2e7d32; font-weight: 600; }
        .active-no  { color: var(--burdo); font-weight: 600; }

        /* ── FOOTER ── */
        footer {
            background: var(--burdo);
            padding: 1rem;
            text-align: center;
            margin-top: auto;
        }
        footer hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.25);
            margin-bottom: 0.6rem;
        }
        footer p {
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="nav-left">
        <svg width="28" height="28" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="52" height="52" rx="6" fill="none" stroke="white" stroke-width="3.5"/>
            <rect x="16" y="16" width="10" height="10" rx="1.5" fill="white"/>
            <rect x="38" y="16" width="10" height="10" rx="1.5" fill="white"/>
            <rect x="16" y="38" width="10" height="10" rx="1.5" fill="white"/>
            <rect x="38" y="38" width="10" height="10" rx="1.5" fill="white"/>
            <rect x="27" y="44" width="10" height="14" rx="1.5" fill="white"/>
        </svg>
        <span class="nav-brand">Staytic — Admin</span>
    </div>
    <a th:href="@{/dashboard}" class="nav-back">
        ← Volver al Dashboard
    </a>
</header>

<!-- MAIN -->
<main>
    <h1 class="page-title">👥 Gestión de Usuarios</h1>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Rol</th>
                <th>Activo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.userId}"></td>
                <td th:text="${u.name}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.phone}"></td>
                <td>
                        <span th:class="${u.role.name() == 'ADMIN'} ? 'badge badge-admin' :
                                        (${u.role.name() == 'RECEPTIONIST'} ? 'badge badge-receptionist' :
                                        'badge badge-guest')"
                              th:text="${u.role}"></span>
                </td>
                <td>
                        <span th:class="${u.active} ? 'active-yes' : 'active-no'"
                              th:text="${u.active} ? 'Sí' : 'No'"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- FOOTER -->
<footer>
    <hr>
    <p>© 2026 Staytic. All rights reserved.</p>
</footer>

</body>
</html>
