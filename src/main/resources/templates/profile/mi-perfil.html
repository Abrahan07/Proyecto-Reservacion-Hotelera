<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
</head>
<body>
<h1>Mi Perfil</h1>

<div th:if="${user == null}">
    <p>No se pudo cargar el perfil.</p>
</div>

<div th:if="${user != null}">
    <p><strong>Nombre:</strong> <span th:text="${user.name}"></span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
    <p><strong>Teléfono:</strong> <span th:text="${user.phone} ?: '-'"></span></p>
    <p><strong>Rol:</strong> <span th:text="${user.role}"></span></p>
    <p><strong>Estado:</strong> <span th:text="${user.active} ? 'Activo' : 'Inactivo'"></span></p>
</div>

<p>
    <a th:href="@{/dashboard}">Volver al dashboard</a>
</p>
</body>
</html>
