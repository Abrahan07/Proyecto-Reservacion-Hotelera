<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Mi Perfil</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --brand: #8B2E2E;
            --brand-dark: #6e2323;
            --bg: #f3f4f6;
            --panel: #ffffff;
            --text: #222;
            --muted: #6b7280;
            --line: #e5e7eb;
            --ok: #1b5e20;
            --danger: #b3261e;
        }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
        header {
            background: var(--brand);
            color: white;
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        header a { color: white; text-decoration: none; font-weight: 700; }
        main { max-width: 1080px; margin: 28px auto; padding: 0 16px; }
        .page-head { display: flex; justify-content: space-between; gap: 18px; align-items: flex-end; margin-bottom: 18px; }
        h1 { margin: 0; color: var(--brand); font-size: 30px; }
        .subtitle { margin: 6px 0 0; color: var(--muted); }
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; align-items: start; }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .identity { text-align: center; }
        .avatar {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            background: var(--brand);
            color: white;
            display: grid;
            place-items: center;
            font-size: 34px;
            font-weight: 800;
            margin: 0 auto 14px;
        }
        .identity h2 { margin: 0 0 6px; font-size: 22px; }
        .muted { color: var(--muted); }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            background: #f7eaea;
            color: var(--brand);
            font-weight: 700;
            margin-top: 12px;
            font-size: 13px;
        }
        .info-list { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; text-align: left; }
        .info-row { margin-bottom: 12px; }
        .info-row span { display: block; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .info-row strong { font-size: 15px; }
        form { margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field-full { grid-column: 1 / -1; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid #cbd5e1;
            border-radius: 7px;
            font-size: 15px;
            background: #fff;
        }
        input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(139,46,46,0.12); }
        .hint { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
        .error { display: block; color: var(--danger); font-size: 13px; margin-top: 4px; }
        .alert { padding: 11px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: var(--ok); }
        .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
        .btn {
            border: 0;
            border-radius: 7px;
            padding: 10px 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 700;
        }
        .btn-primary { background: var(--brand); color: white; }
        .btn-primary:hover { background: var(--brand-dark); }
        .btn-secondary { background: #4b5563; color: white; }
        @media (max-width: 860px) {
            header, .page-head { align-items: stretch; flex-direction: column; }
            .layout, .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic</strong>
    <a th:href="@{/dashboard}">Dashboard</a>
</header>

<main>
    <div class="page-head">
        <div>
            <h1>Mi perfil</h1>
            <p class="subtitle">Consulta y actualiza tus datos personales.</p>
        </div>
        <a class="btn btn-secondary" th:href="@{/mis-reservas}">Mis reservas</a>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <div class="layout">
        <aside class="card identity">
            <div class="avatar" th:text="${#strings.substring(user.name,0,1)}">C</div>
            <h2 th:text="${user.name}">Cliente</h2>
            <div class="muted" th:text="${user.email}"></div>
            <span class="badge" th:text="${user.role.name() == 'GUEST' ? 'Cliente' : user.role}">Cliente</span>

            <div class="info-list">
                <div class="info-row">
                    <span>Telefono</span>
                    <strong th:text="${#strings.isEmpty(user.phone) ? '-' : user.phone}"></strong>
                </div>
                <div class="info-row">
                    <span>Estado</span>
                    <strong th:text="${user.active} ? 'Activo' : 'Inactivo'"></strong>
                </div>
            </div>
        </aside>

        <section class="card">
            <form th:action="@{/mi-perfil}" th:object="${profileForm}" method="post">
                <div class="grid">
                    <div>
                        <label for="name">Nombre completo</label>
                        <input id="name" type="text" th:field="*{name}" required>
                        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                    </div>

                    <div>
                        <label for="email">Correo electronico</label>
                        <input id="email" type="email" th:field="*{email}" required>
                        <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>

                    <div>
                        <label for="phone">Telefono</label>
                        <input id="phone" type="text" th:field="*{phone}">
                        <span class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                    </div>

                    <div>
                        <label for="password">Nueva contrasena</label>
                        <input id="password" type="password" th:field="*{password}">
                        <p class="hint">Dejala vacia si no quieres cambiarla.</p>
                        <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Guardar cambios</button>
                    <a class="btn btn-secondary" th:href="@{/dashboard}">Cancelar</a>
                </div>
            </form>
        </section>
    </div>
</main>
</body>
</html>
