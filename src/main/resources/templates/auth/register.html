<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StayTic - Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { font-size: 2rem; color: #1a1a2e; letter-spacing: 2px; }
        .logo span { color: #4361ee; }
        .field { margin-bottom: 1rem; }
        label { display: block; color: #555; font-size: 0.9rem; margin-bottom: 0.3rem; }
        input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #4361ee; }
        .error { color: #c0392b; font-size: 0.82rem; margin-top: 0.3rem; display: block; }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        button:hover { background: #3a56d4; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #888; }
        .link a { color: #4361ee; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>Stay<span>Tic</span></h1>
        <p>Create your account</p>
    </div>

    <form th:action="@{/register}" th:object="${usuario}" method="post">
        <div class="field">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="John Doe" />
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}" class="error"></span>
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="your@email.com" />
            <span th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}" class="error"></span>
        </div>
        <div class="field">
            <label>Phone</label>
            <input type="text" th:field="*{phone}" placeholder="+57 300 000 0000" />
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="••••••••" />
        </div>
        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
</div>
</body>
</html>
