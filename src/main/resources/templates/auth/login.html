<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>StayTic - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 2rem;
            color: #1a1a2e;
            letter-spacing: 2px;
        }
        .logo span { color: #4361ee; }
        .logo p { color: #888; font-size: 0.9rem; }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-error { background: #ffe0e0; color: #c0392b; }
        .alert-success { background: #e0f7e9; color: #27ae60; }
        .field { margin-bottom: 1rem; }
        label { display: block; color: #555; font-size: 0.9rem; margin-bottom: 0.3rem; }
        input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #4361ee; }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        button:hover { background: #3a56d4; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #888; }
        .link a { color: #4361ee; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>Stay<span>Tic</span></h1>
        <p>Hotel Reservation System</p>
    </div>

    <div th:if="${param.error}" class="alert alert-error">
        Invalid email or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Session closed successfully.
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        Registration successful. Please log in.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="field">
            <label>Email</label>
            <input type="email" name="username" placeholder="your@email.com" required />
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit">Sign In</button>
    </form>

    <div class="link">
        Don't have an account? <a th:href="@{/register}">Register here</a>
    </div>
</div>
</body>
</html>
