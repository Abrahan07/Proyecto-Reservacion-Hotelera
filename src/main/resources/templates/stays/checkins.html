<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Check-in</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; margin-left: 14px; }
        main { max-width: 1180px; margin: 26px auto; padding: 0 16px; }
        .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
        h1 { margin: 0; color: #8B2E2E; font-size: 28px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
        .filters { display: grid; grid-template-columns: repeat(5, minmax(130px, 1fr)); gap: 12px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input { width: 100%; padding: 9px 10px; border: 1px solid #bbb; border-radius: 6px; }
        .alert { padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: #1b5e20; }
        .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 920px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        th { background: #8B2E2E; color: white; font-size: 13px; text-transform: uppercase; }
        .muted { color: #666; font-size: 13px; }
        @media (max-width: 850px) {
            header, .topbar { align-items: stretch; flex-direction: column; }
            .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Check-in</strong>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/receptionist/reservations}">Reservaciones</a>
    </nav>
</header>

<main>
    <div class="topbar">
        <h1>Check-ins registrados</h1>
        <a class="btn btn-primary" th:href="@{/receptionist/checkins/new}">Registrar check-in</a>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <section class="panel">
        <form class="filters" th:action="@{/receptionist/checkins}" method="get">
            <div>
                <label for="roomText">Habitacion</label>
                <input id="roomText" name="roomText" type="text" th:value="${roomText}" placeholder="101">
            </div>
            <div>
                <label for="fromDate">Desde</label>
                <input id="fromDate" name="fromDate" type="date" th:value="${fromDate}">
            </div>
            <div>
                <label for="toDate">Hasta</label>
                <input id="toDate" name="toDate" type="date" th:value="${toDate}">
            </div>
            <div>
                <label for="employeeText">Empleado</label>
                <input id="employeeText" name="employeeText" type="text" th:value="${employeeText}" placeholder="Nombre o email">
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/checkins}">Limpiar</a>
            </div>
        </form>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Reserva</th>
                <th>Huesped</th>
                <th>Habitaciones</th>
                <th>Fecha/hora entrada</th>
                <th>Empleado responsable</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(checkins)}">
                <td colspan="5">No hay check-ins registrados con esos filtros.</td>
            </tr>
            <tr th:each="r : ${checkins}">
                <td th:text="${r.reservationId}"></td>
                <td>
                    <strong th:text="${r.user.name}"></strong><br>
                    <span class="muted" th:text="${r.user.email}"></span>
                </td>
                <td>
                    <div th:each="d : ${r.details}" th:text="${d.room.number}"></div>
                </td>
                <td th:text="${#temporals.format(r.checkInDateTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <span th:text="${r.employeeCheckIn.name}"></span><br>
                    <span class="muted" th:text="${r.employeeCheckIn.email}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
