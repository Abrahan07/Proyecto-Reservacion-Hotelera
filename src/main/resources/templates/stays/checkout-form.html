<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Registrar Check-out</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; }
        main { max-width: 760px; margin: 26px auto; padding: 0 16px; }
        h1 { margin: 0 0 18px; color: #8B2E2E; font-size: 28px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field-full { grid-column: 1 / -1; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #bbb; border-radius: 6px; }
        .error { display: block; color: #b3261e; font-size: 13px; margin-top: 4px; }
        .global-error { background: #fdecea; color: #b3261e; padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; }
        .actions { display: flex; gap: 10px; margin-top: 18px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Check-out</strong>
    <a th:href="@{/receptionist/checkouts}">Volver a check-outs</a>
</header>

<main>
    <h1>Registrar check-out</h1>

    <section class="panel">
        <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        </div>

        <form th:object="${checkOutForm}" th:action="@{/receptionist/checkouts}" method="post">
            <div class="grid">
                <div class="field-full">
                    <label for="reservationId">Reservacion</label>
                    <select id="reservationId" th:field="*{reservationId}" required>
                        <option value="">Seleccione una reservacion</option>
                        <option th:each="r : ${reservations}" th:value="${r.reservationId}"
                                th:text="${'#' + r.reservationId + ' - ' + r.user.name + ' - ' + r.status}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('reservationId')}" th:errors="*{reservationId}"></span>
                </div>

                <div class="field-full">
                    <label for="checkOutDateTime">Fecha/hora real de salida</label>
                    <input id="checkOutDateTime" type="datetime-local" th:field="*{checkOutDateTime}" required>
                    <span class="error" th:if="${#fields.hasErrors('checkOutDateTime')}" th:errors="*{checkOutDateTime}"></span>
                </div>

                <div>
                    <label for="additionalCharges">Consumos adicionales</label>
                    <input id="additionalCharges" type="number" min="0" step="0.01" th:field="*{additionalCharges}">
                    <span class="error" th:if="${#fields.hasErrors('additionalCharges')}" th:errors="*{additionalCharges}"></span>
                </div>

                <div>
                    <label for="penalty">Penalizacion</label>
                    <input id="penalty" type="number" min="0" step="0.01" th:field="*{penalty}">
                    <span class="error" th:if="${#fields.hasErrors('penalty')}" th:errors="*{penalty}"></span>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Registrar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/checkouts}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
