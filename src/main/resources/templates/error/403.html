<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>StayTic - Access Denied</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #e74c3c; margin-bottom: 0.5rem; }
        .code { color: #aaa; margin-bottom: 1rem; }
        p { color: #555; margin-bottom: 1.5rem; }
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #4361ee;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
        a:hover { background: #3a56d4; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🚫</div>
    <h1>Access Denied</h1>
    <p class="code">Error 403 — Forbidden</p>
    <p>User <strong sec:authentication="name"></strong>
        does not have permission to access this resource.</p>
    <a th:href="@{/dashboard}">← Back to Dashboard</a>
</div>
</body>
</html>
