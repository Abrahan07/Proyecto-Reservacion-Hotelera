<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Staytic - Acceso Denegado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --burdo: #8B2E2E;
            --burdo-dark: #6e2323;
            --bg: #e8e8e8;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --muted: #666;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--burdo);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 3rem 2.4rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 1.2rem;
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--burdo);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .code {
            display: inline-block;
            background: #f5eded;
            color: var(--burdo);
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            margin-bottom: 1.2rem;
        }

        .card p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.6rem;
            background: var(--burdo);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-back:hover { background: var(--burdo-dark); }
        .btn-back:active { transform: scale(0.98); }

        footer {
            background: var(--burdo);
            padding: 1rem;
            text-align: center;
        }
        footer hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.25);
            margin-bottom: 0.6rem;
        }
        footer p {
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<header>
    <svg width="28" height="28" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="52" height="52" rx="6" fill="none" stroke="white" stroke-width="3.5"/>
        <rect x="16" y="16" width="10" height="10" rx="1.5" fill="white"/>
        <rect x="38" y="16" width="10" height="10" rx="1.5" fill="white"/>
        <rect x="16" y="38" width="10" height="10" rx="1.5" fill="white"/>
        <rect x="38" y="38" width="10" height="10" rx="1.5" fill="white"/>
        <rect x="27" y="44" width="10" height="14" rx="1.5" fill="white"/>
    </svg>
    <span class="nav-brand">Staytic</span>
</header>

<main>
    <div class="card">
        <div class="icon">🚫</div>
        <h1>Acceso Denegado</h1>
        <span class="code">Error 403 — Prohibido</span>
        <p>
            El usuario <strong sec:authentication="name"></strong>
            no tiene permisos para acceder a este recurso.
        </p>
        <a th:href="@{/dashboard}" class="btn-back">
            ← Volver al Dashboard
        </a>
    </div>
</main>

<footer>
    <hr>
    <p>© 2026 Staytic. All rights reserved.</p>
</footer>

</body>
</html>
