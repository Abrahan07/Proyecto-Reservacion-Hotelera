<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Habitaciones</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; margin-left: 14px; }
        main { max-width: 1220px; margin: 26px auto; padding: 0 16px; }
        .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
        h1 { margin: 0; color: #8B2E2E; font-size: 28px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn-danger { background: #b3261e; color: white; }
        .btn-small { padding: 7px 10px; font-size: 13px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
        .filters { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 12px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 9px 10px; border: 1px solid #bbb; border-radius: 6px; }
        .alert { padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: #1b5e20; }
        .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 980px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        th { background: #8B2E2E; color: white; font-size: 13px; text-transform: uppercase; }
        tr:last-child td { border-bottom: 0; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #eee; display: inline-block; }
        .AVAILABLE { color: #1b5e20; background: #e8f5e9; }
        .OCCUPIED { color: #8B2E2E; background: #fbe9e7; }
        .MAINTENANCE { color: #795548; background: #efebe9; }
        .status-form { display: flex; gap: 6px; align-items: center; }
        .status-form select { min-width: 145px; }
        @media (max-width: 900px) {
            header, .topbar { align-items: stretch; flex-direction: column; }
            .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Recepcion</strong>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
    </nav>
</header>

<main>
    <div class="topbar">
        <h1>Gestion de habitaciones</h1>
        <a class="btn btn-primary" th:href="@{/receptionist/rooms/new}">Nueva habitacion</a>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <section class="panel">
        <form class="filters" th:action="@{/receptionist/rooms}" method="get">
            <div>
                <label for="number">Numero</label>
                <input id="number" name="number" type="text" th:value="${number}" placeholder="101">
            </div>
            <div>
                <label for="floor">Piso</label>
                <input id="floor" name="floor" type="number" min="1" th:value="${floor}">
            </div>
            <div>
                <label for="type">Tipo</label>
                <select id="type" name="type">
                    <option value="">Todos</option>
                    <option th:each="t : ${roomTypes}" th:value="${t}" th:text="${t}"
                            th:selected="${selectedType != null and selectedType == t}"></option>
                </select>
            </div>
            <div>
                <label for="price">Precio</label>
                <input id="price" name="price" type="number" min="0" step="0.01" th:value="${price}">
            </div>
            <div>
                <label for="status">Estado</label>
                <select id="status" name="status">
                    <option value="">Todos</option>
                    <option th:each="s : ${roomStatuses}" th:value="${s}" th:text="${s}"
                            th:selected="${selectedStatus != null and selectedStatus == s}"></option>
                </select>
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/rooms}">Limpiar</a>
            </div>
        </form>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Numero</th>
                <th>Piso</th>
                <th>Tipo</th>
                <th>Precio/noche</th>
                <th>Estado</th>
                <th>Descripcion</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(rooms)}">
                <td colspan="8">No hay habitaciones registradas con esos filtros.</td>
            </tr>
            <tr th:each="r : ${rooms}">
                <td th:text="${r.roomId}"></td>
                <td th:text="${r.number}"></td>
                <td th:text="${r.floor}"></td>
                <td><span class="badge" th:text="${r.type}"></span></td>
                <td th:text="${#numbers.formatDecimal(r.pricePerNight, 1, 2)}"></td>
                <td>
                    <span th:class="'badge ' + ${r.status}" th:text="${r.status}"></span>
                </td>
                <td th:text="${r.description}"></td>
                <td>
                    <div class="actions">
                        <form class="status-form" th:action="@{/receptionist/rooms/{id}/status(id=${r.roomId})}" method="post">
                            <select name="status">
                                <option th:each="s : ${roomStatuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${r.status == s}"></option>
                            </select>
                            <button class="btn btn-primary btn-small" type="submit">Cambiar</button>
                        </form>
                        <a class="btn btn-secondary btn-small" th:href="@{/receptionist/rooms/{id}/edit(id=${r.roomId})}">Editar</a>
                        <form th:action="@{/receptionist/rooms/{id}/delete(id=${r.roomId})}" method="post"
                              onsubmit="return confirm('Seguro que deseas eliminar esta habitacion?');">
                            <button class="btn btn-danger btn-small" type="submit">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
