<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Pagos</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; margin-left: 14px; }
        main { max-width: 1180px; margin: 26px auto; padding: 0 16px; }
        .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
        h1 { margin: 0; color: #8B2E2E; font-size: 28px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn-danger { background: #b3261e; color: white; }
        .btn-small { padding: 7px 10px; font-size: 13px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
        .filters { display: grid; grid-template-columns: repeat(5, minmax(130px, 1fr)); gap: 12px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 9px 10px; border: 1px solid #bbb; border-radius: 6px; }
        .alert { padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: #1b5e20; }
        .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        th { background: #8B2E2E; color: white; font-size: 13px; text-transform: uppercase; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .muted { color: #666; font-size: 13px; }
        .badge { padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #eee; display: inline-block; }
        @media (max-width: 850px) {
            header, .topbar { align-items: stretch; flex-direction: column; }
            .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Pagos</strong>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/receptionist/reservations}">Reservaciones</a>
    </nav>
</header>

<main>
    <div class="topbar">
        <h1>Gestion de pagos</h1>
        <a class="btn btn-primary" th:href="@{/receptionist/payments/new}">Nuevo pago</a>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <section class="panel">
        <form class="filters" th:action="@{/receptionist/payments}" method="get">
            <div>
                <label for="reservationText">Reservacion</label>
                <input id="reservationText" name="reservationText" type="text" th:value="${reservationText}" placeholder="ID, nombre o email">
            </div>
            <div>
                <label for="amount">Monto</label>
                <input id="amount" name="amount" type="number" min="0" step="0.01" th:value="${amount}">
            </div>
            <div>
                <label for="method">Metodo</label>
                <select id="method" name="method">
                    <option value="">Todos</option>
                    <option th:each="m : ${methods}" th:value="${m}" th:text="${m}"
                            th:selected="${selectedMethod != null and selectedMethod == m}"></option>
                </select>
            </div>
            <div>
                <label for="paymentDate">Fecha</label>
                <input id="paymentDate" name="paymentDate" type="date" th:value="${paymentDate}">
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/payments}">Limpiar</a>
            </div>
        </form>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Reservacion</th>
                <th>Monto</th>
                <th>Metodo</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Referencia</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="8">No hay pagos registrados con esos filtros.</td>
            </tr>
            <tr th:each="p : ${payments}">
                <td th:text="${p.paymentId}"></td>
                <td>
                    <strong th:text="'#' + ${p.reservation.reservationId}"></strong><br>
                    <span class="muted" th:text="${p.reservation.user.name + ' - ' + p.reservation.user.email}"></span>
                </td>
                <td th:text="${#numbers.formatDecimal(p.amount, 1, 2)}"></td>
                <td><span class="badge" th:text="${p.paymentMethod}"></span></td>
                <td th:text="${p.paymentDate}"></td>
                <td th:text="${p.status}"></td>
                <td th:text="${p.reference}"></td>
                <td>
                    <div class="actions">
                        <a class="btn btn-secondary btn-small" th:href="@{/receptionist/payments/{id}/edit(id=${p.paymentId})}">Editar</a>
                        <form th:action="@{/receptionist/payments/{id}/delete(id=${p.paymentId})}" method="post"
                              onsubmit="return confirm('Seguro que deseas eliminar este pago?');">
                            <button class="btn btn-danger btn-small" type="submit">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
