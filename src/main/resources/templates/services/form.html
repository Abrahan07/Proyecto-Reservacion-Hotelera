<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Servicio</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; }
        main { max-width: 720px; margin: 26px auto; padding: 0 16px; }
        h1 { margin: 0 0 18px; color: #8B2E2E; font-size: 28px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field-full { grid-column: 1 / -1; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #bbb; border-radius: 6px; font-family: Arial, sans-serif; }
        textarea { min-height: 90px; resize: vertical; }
        .check-row { display: flex; align-items: center; gap: 8px; }
        .check-row input { width: auto; }
        .error { display: block; color: #b3261e; font-size: 13px; margin-top: 4px; }
        .global-error { background: #fdecea; color: #b3261e; padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; }
        .actions { display: flex; gap: 10px; margin-top: 18px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        @media (max-width: 700px) {
            header { align-items: stretch; flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Servicios</strong>
    <a th:href="@{/receptionist/services}">Volver a servicios</a>
</header>

<main>
    <h1 th:text="${editing} ? 'Editar servicio' : 'Nuevo servicio'"></h1>

    <section class="panel">
        <form th:object="${service}"
              th:action="${editing} ? @{/receptionist/services/{id}(id=${service.serviceId})} : @{/receptionist/services}"
              method="post">
            <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>
            <div class="grid">
                <div>
                    <label for="name">Nombre</label>
                    <input id="name" type="text" th:field="*{name}" required>
                    <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>

                <div>
                    <label for="price">Precio</label>
                    <input id="price" type="number" min="0" step="0.01" th:field="*{price}" required>
                    <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                </div>

                <div class="field-full">
                    <label for="description">Descripcion</label>
                    <textarea id="description" th:field="*{description}"></textarea>
                    <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>

                <div class="field-full">
                    <label class="check-row">
                        <input type="checkbox" th:field="*{available}">
                        Servicio disponible
                    </label>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/services}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
