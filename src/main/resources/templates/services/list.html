<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staytic - Servicios</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
        header { background: #8B2E2E; color: white; padding: 14px 22px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: 600; margin-left: 14px; }
        main { max-width: 1040px; margin: 26px auto; padding: 0 16px; }
        .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
        h1 { margin: 0; color: #8B2E2E; font-size: 28px; }
        .btn { border: 0; border-radius: 7px; padding: 10px 14px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; }
        .btn-primary { background: #8B2E2E; color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn-danger { background: #b3261e; color: white; }
        .btn-small { padding: 7px 10px; font-size: 13px; }
        .panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
        .filters { display: grid; grid-template-columns: repeat(4, minmax(130px, 1fr)); gap: 12px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input, select { width: 100%; padding: 9px 10px; border: 1px solid #bbb; border-radius: 6px; }
        .alert { padding: 10px 12px; border-radius: 7px; margin-bottom: 14px; background: #e8f5e9; color: #1b5e20; }
        .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 780px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        th { background: #8B2E2E; color: white; font-size: 13px; text-transform: uppercase; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .active { color: #1b5e20; font-weight: 700; }
        .inactive { color: #b3261e; font-weight: 700; }
        @media (max-width: 800px) {
            header, .topbar { align-items: stretch; flex-direction: column; }
            .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <strong>Staytic - Servicios</strong>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/receptionist/reservations}">Reservaciones</a>
    </nav>
</header>

<main>
    <div class="topbar">
        <h1>Servicios adicionales</h1>
        <a class="btn btn-primary" th:href="@{/receptionist/services/new}">Nuevo servicio</a>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <section class="panel">
        <form class="filters" th:action="@{/receptionist/services}" method="get">
            <div>
                <label for="name">Servicio</label>
                <input id="name" name="name" type="text" th:value="${name}" placeholder="Spa, restaurante...">
            </div>
            <div>
                <label for="price">Precio</label>
                <input id="price" name="price" type="number" min="0" step="0.01" th:value="${price}">
            </div>
            <div>
                <label for="available">Disponibilidad</label>
                <select id="available" name="available">
                    <option value="">Todos</option>
                    <option value="true" th:selected="${selectedAvailable != null and selectedAvailable}">Disponible</option>
                    <option value="false" th:selected="${selectedAvailable != null and !selectedAvailable}">No disponible</option>
                </select>
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a class="btn btn-secondary" th:href="@{/receptionist/services}">Limpiar</a>
            </div>
        </form>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>Precio</th>
                <th>Disponible</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(services)}">
                <td colspan="6">No hay servicios con esos filtros.</td>
            </tr>
            <tr th:each="s : ${services}">
                <td th:text="${s.serviceId}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.description}"></td>
                <td th:text="${#numbers.formatDecimal(s.price, 1, 2)}"></td>
                <td>
                    <span th:class="${s.available} ? 'active' : 'inactive'"
                          th:text="${s.available} ? 'Si' : 'No'"></span>
                </td>
                <td>
                    <div class="actions">
                        <a class="btn btn-secondary btn-small" th:href="@{/receptionist/services/{id}/edit(id=${s.serviceId})}">Editar</a>
                        <form th:action="@{/receptionist/services/{id}/delete(id=${s.serviceId})}" method="post"
                              onsubmit="return confirm('Seguro que deseas eliminar este servicio?');">
                            <button class="btn btn-danger btn-small" type="submit">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
